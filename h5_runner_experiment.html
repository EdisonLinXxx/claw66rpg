      };
      XMLHttpRequest.prototype.send = function () {
        this.addEventListener('loadend', function () {
          var len = 'n/a';
          if (this.response instanceof ArrayBuffer) len = this.response.byteLength;
          else if (!this.responseType || this.responseType === 'text') {
            try {
              if (typeof this.responseText === 'string') len = this.responseText.length;
            } catch (error) {
              len = 'unreadable';
            }
          }
          logLine('XHR ' + this.status + ' ' + len + ' ' + this.__runnerUrl);
        });
        return send.apply(this, arguments);
      };
    })();
