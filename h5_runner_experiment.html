  <script>
    logLine('starting game init');
    try {
      if (hasQueryFlag('traceReads') && window.GameByte && !GameByte.prototype.__runnerTracePatched) {
        var runnerTrace = [];
        function pushTrace(item) {
          runnerTrace.push(item);
          if (runnerTrace.length > 30) runnerTrace.shift();
        }
        var originalGetInt32 = GameByte.prototype.getInt32;
        var originalReadStringE = GameByte.prototype.readStringE;
        var originalReadCString = GameByte.prototype.readCString;
        GameByte.prototype.getInt32 = function () {
          var before = { op: 'getInt32', pos: this.pos, bytesAvailable: this.bytesAvailable, length: this.length };
          try {
            var value = originalGetInt32.apply(this, arguments);
            before.value = value;
            before.after = this.pos;
            pushTrace(before);
            return value;
          } catch (error) {
            logLine('TRACE getInt32 error at pos=' + this.pos + ' bytesAvailable=' + this.bytesAvailable + ' length=' + this.length);
            logLine('TRACE recent=' + JSON.stringify(runnerTrace));
            throw error;
          }
        };
        GameByte.prototype.readStringE = function () {
          var pos = this.pos;
          var value = originalReadStringE.apply(this, arguments);
          pushTrace({ op: 'readStringE', pos: pos, after: this.pos, valueLen: value ? value.length : 0, sample: value ? String(value).slice(0, 32) : '' });
          return value;
        };
        GameByte.prototype.readCString = function () {
          var pos = this.pos;
          var value = originalReadCString.apply(this, arguments);
          pushTrace({ op: 'readCString', pos: pos, after: this.pos, valueLen: value ? value.length : 0, sample: value ? String(value).slice(0, 32) : '' });
          return value;
        };
        GameByte.prototype.__runnerTracePatched = true;
        logLine('GameByte trace enabled');
      }
      if (hasQueryFlag('fixEndian') && window.LoadAssets && LoadAssets.prototype && !LoadAssets.prototype.__runnerEndianPatched) {
        LoadAssets.prototype.loadFile = function (url) {

            OHandler.create(this, function (data) {
              var bytes = new GameByte(data);
              bytes.endian = OByteArray.LITTLE_ENDIAN;
              this.readGameBin(bytes);
            }),
            OHandler.create(this, this.gbProgress, null, false),
            'arraybuffer',
            0,
            false

        };
        LoadAssets.prototype.__runnerEndianPatched = true;

      if (hasQueryFlag('traceStructs') && window.org_data && !org_data.__runnerStructTracePatched) {
        [
          'DMain',
          'DHeader',
          'DSystem',
          'DFileName',

          var Original = org_data[name];
          if (!Original || Original.__runnerWrapped) return;
          var Wrapped = function () {
            var stream = arguments[0];
            var before = stream && typeof stream.pos === 'number' ? stream.pos : 'n/a';
            logLine('STRUCT enter ' + name + ' pos=' + before);
            try {
              var result = new (Function.prototype.bind.apply(Original, [null].concat(Array.prototype.slice.call(arguments))))();
              var after = stream && typeof stream.pos === 'number' ? stream.pos : 'n/a';
              logLine('STRUCT exit ' + name + ' pos=' + after);

              var at = stream && typeof stream.pos === 'number' ? stream.pos : 'n/a';
              logLine('STRUCT error ' + name + ' pos=' + at + ' message=' + (error && error.message || error));
              throw error;
            }
          };
          Wrapped.prototype = Original.prototype;
          Wrapped.__runnerWrapped = true;
          org_data[name] = Wrapped;
        });
        org_data.__runnerStructTracePatched = true;
        logLine('struct trace enabled');
      }
      if ((hasQueryFlag('skipButtonPad') || hasQueryFlag('patchNewDSystem')) && window.org_data && org_data.DButton && !org_data.DButton.__runnerPadWrapped) {
        var OriginalDButton = org_data.DButton;
        var readI32LE = function (stream, pos) {
          try {
            return new DataView(stream.buffer).getInt32(pos, true);
          } catch (error) {
            return null;
          }
        };
        var PaddedDButton = function (stream) {
          if (stream && typeof stream.pos === 'number' && stream.pos + 5 < stream.length) {
            var current = readI32LE(stream, stream.pos);
            var shifted = readI32LE(stream, stream.pos + 1);
            if (stream.buffer && new Uint8Array(stream.buffer, stream.pos, 1)[0] === 0 && current % 256 === 0 && shifted > 0 && shifted < 10000) {
              logLine('skip DButton leading pad at pos=' + stream.pos + ' current=' + current + ' shifted=' + shifted);
              stream.pos += 1;
            }
          }
          return new OriginalDButton(stream);
        };
        PaddedDButton.prototype = OriginalDButton.prototype;
        PaddedDButton.__runnerPadWrapped = true;
        org_data.DButton = PaddedDButton;
        logLine('button padding patch enabled');

      if (hasQueryFlag('patchNewDSystem') && window.org_data && org_data.DSystem && !org_data.DSystem.__runnerNewPatched) {
        var parseEventList = function (stream) {
          var count = stream.getInt32();
          var events = new Array(count);
          for (var index = 0; index < count; index++) {
            stream.getInt32();
            events[index] = new org_data.DEvent(stream);
          }
          return events;
        };
        var NewCustomUIItem = function (stream) {
          stream.getInt32();
          this.event = parseEventList(stream);
          this.type = stream.getInt32();
          this.isUserString = stream.getInt32() !== 0;
          this.image1 = stream.readStringE();

        var NewCustomUIData = function (stream, declaredSize) {

          stream.getInt32();
          this.loadEvent = parseEventList(stream);
          this.afterEvent = [];
          var controlCount = stream.getInt32();
          this.controls = new Array(controlCount);
          for (var index = 0; index < controlCount; index++) {
            this.controls[index] = new NewCustomUIItem(stream);

            switch (this.FontStyle) {
              case 1: this.FontFilter = true; this.FontStyleColor = '#000000'; break;
              case 2: this.FontFilter = true; this.FontStyleColor = '#999b9f'; break;
              case 3: this.FontFilter = true; this.FontStyleColor = '#FFFFFF'; break;
              case 4: this.FontStroke = true; this.FontStyleColor = '#000000'; break;
              case 5: this.FontStroke = true; this.FontStyleColor = '#999b9f'; break;

          this.ShowAD = stream.getInt32() !== 0;
          this.AuthorWords = stream.readStringE();
          this.AuthorWordsTiming = stream.getInt32();

          this.SEMove = new org_data.DMusicItem(stream);
          this.SECancel = new org_data.DMusicItem(stream);
          this.SEError = new org_data.DMusicItem(stream);
          this.Title = new org_data.DTitle(stream);
          this.GameMenu = new org_data.DGameMenu(stream);

          this.BGM = new org_data.DBGM(stream);

          this.MessageBox = new org_data.DMessageBox(stream);
          this.Replay = new org_data.DReplay(stream);
          this.Setting = new org_data.DSetting(stream);
          var oldButtonCount = stream.getInt32();
          var buttonCount = oldButtonCount === 80 ? 453 : oldButtonCount;
          this.Buttons = new Array(buttonCount);
          for (var index = 0; index < buttonCount; index++) {
            this.Buttons[index] = new org_data.DButton(stream);
          }
          logLine('new DSystem buttons oldCount=' + oldButtonCount + ' parsed=' + buttonCount + ' pos=' + stream.pos);

          this.Cuis = null;
          this.MenuIndex = 0;

          if (GloableData.getInstance().gameInfo.ver >= 103) {
            var cuiCount = stream.getInt32();
            this.Cuis = new Array(cuiCount);
            for (var cuiIndex = 0; cuiIndex < cuiCount; cuiIndex++) {
              var declaredSize = stream.getInt32();
              this.Cuis[cuiIndex] = new NewCustomUIData(stream, declaredSize);

            logLine('new DSystem Cuis parsed=' + cuiCount + ' menuIndex=' + this.MenuIndex + ' pos=' + stream.pos);
          }
        };
        NewDSystem.__runnerNewPatched = true;
        org_data.DSystem = NewDSystem;
        logLine('new DSystem parser patch enabled');
