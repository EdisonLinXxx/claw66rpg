    function GetImageBase64(src, width, height, callback) {
      var image = document.createElement("img");
      image.setAttribute("crossOrigin", "anonymous");
      image.onload = function () {
        try {
          var canvas = document.createElement("canvas");
          canvas.width = width || image.naturalWidth || image.width || 1;
          canvas.height = height || image.naturalHeight || image.height || 1;

        } catch (error) {
          logLine("GetImageBase64 failed: " + (error && (error.stack || error.message) || error));
          callback("");
        }
      };
      image.onerror = function () {
        logLine("GetImageBase64 image error: " + src);
        callback("");
      };
      image.src = src;
    }
